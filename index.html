<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS TUBE | PURPLE ELITE</title>
    <style>
        :root { --main-purple: #BC13FE; --bg-dark: #0F001E; --card-bg: #1a0033; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        
        /* Header Style */
        .navbar { background: #000; padding: 20px; border-bottom: 3px solid var(--main-purple); text-align: center; box-shadow: 0 4px 15px rgba(188, 19, 254, 0.3); }
        .navbar h1 { color: var(--main-purple); margin: 0; font-size: 32px; text-transform: uppercase; letter-spacing: 4px; }

        /* Content Area */
        .container { max-width: 1200px; margin: auto; padding: 40px 20px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        /* Video Card */
        .card { background: var(--card-bg); border-radius: 15px; border: 1px solid #3c0064; overflow: hidden; transition: 0.4s; position: relative; }
        .card:hover { transform: scale(1.03); border-color: var(--main-purple); box-shadow: 0 0 20px var(--main-purple); }
        
        video { width: 100%; display: block; background: #000; }

        .info { padding: 20px; }
        .title { font-size: 18px; font-weight: bold; color: var(--main-purple); margin-bottom: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Buttons */
        .dl-btn { display: block; width: 100%; padding: 12px; background: var(--main-purple); color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .dl-btn:hover { background: #9b10d4; box-shadow: 0 0 10px #BC13FE; }

        .refresh-btn { margin-top: 20px; padding: 10px 20px; background: transparent; border: 1px solid var(--main-purple); color: var(--main-purple); cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>JS TUBE</h1>
    </div>

    <div class="container">
        <div class="video-grid" id="video-gallery">
            <p id="loading-text">Scanning GitHub for videos...</p>
        </div>
        <center><button class="refresh-btn" onclick="fetchVideos()">REFRESH FEED</button></center>
    </div>

    <script>
        // --- CONFIGURATION (CRITICAL) ---
        // Change these to YOUR actual GitHub details
        const USERNAME = "YOUR_GITHUB_USERNAME";
        const REPO = "my-tube";
        const FOLDER = "videos";

        async function fetchVideos() {
            const gallery = document.getElementById('video-gallery');
            const loader = document.getElementById('loading-text');
            
            try {
                // Fetching the folder contents via GitHub API
                const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.message === "Not Found") {
                    gallery.innerHTML = `<h3>Error: Folder '${FOLDER}' not found in repo!</h3>`;
                    return;
                }

                gallery.innerHTML = ""; // Clear loader

                data.forEach(file => {
                    if (file.name.endsWith('.mp4') || file.name.endsWith('.webm')) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <video controls preload="metadata">
                                <source src="${file.download_url}" type="video/mp4">
                            </video>
                            <div class="info">
                                <div class="title">${file.name.replace('.mp4', '')}</div>
                                <a href="${file.download_url}" class="dl-btn" download>DOWNLOAD VIDEO</a>
                            </div>
                        `;
                        gallery.appendChild(card);
                    }
                });

                if(gallery.innerHTML === "") {
                    gallery.innerHTML = "<h3>No videos found in the /videos folder!</h3>";
                }

            } catch (error) {
                gallery.innerHTML = "<h3>Connection Error. Check your repo settings.</h3>";
                console.error(error);
            }
        }

        // Run on page load
        fetchVideos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS TUBE | VIDEO HUB</title>
    <style>
        :root { --purple: #BC13FE; --dark: #0F001E; --card: #1a0033; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        .nav { background: #000; padding: 15px; border-bottom: 2px solid var(--purple); text-align: center; }
        .nav h1 { color: var(--purple); margin: 0; font-size: 28px; letter-spacing: 2px; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 30px; }
        
        .video-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #3c0064; transition: 0.3s; }
        .video-card:hover { transform: translateY(-5px); border-color: var(--purple); }
        
        video { width: 100%; aspect-ratio: 16/9; background: #000; }
        
        .info { padding: 15px; }
        .video-title { font-size: 18px; margin: 0 0 10px 0; color: var(--purple); font-weight: bold; }
        
        .actions { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 10px; text-align: center; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .dl-btn { background: var(--purple); color: white; }
        .view-btn { border: 1px solid var(--purple); color: var(--purple); }
    </style>
</head>
<body>

    <div class="nav">
        <h1>JS TUBE</h1>
    </div>

    <div class="container" id="video-list">
        </div>

    <script>
        // CHANGE THESE TWO LINES TO YOUR GITHUB INFO
        const GITHUB_USER = "YOUR_USERNAME_HERE";
        const REPO_NAME = "YOUR_REPO_NAME_HERE";
        const FOLDER_NAME = "videos"; 

        async function fetchVideos() {
            const listContainer = document.getElementById('video-list');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FOLDER_NAME}`);
                const files = await response.json();

                if (files.message === "Not Found") {
                    listContainer.innerHTML = "<h2>Error: 'videos' folder not found in repo!</h2>";
                    return;
                }

                files.forEach(file => {
                    if (file.name.endsWith('.mp4') || file.name.endsWith('.mov') || file.name.endsWith('.webm')) {
                        const card = document.createElement('div');
                        card.className = 'video-card';
                        card.innerHTML = `
                            <video controls preload="metadata">
                                <source src="${file.download_url}" type="video/mp4">
                            </video>
                            <div class="info">
                                <p class="video-title">${file.name.replace(/\.[^/.]+$/, "")}</p>
                                <div class="actions">
                                    <a href="${file.download_url}" class="btn dl-btn" download>DOWNLOAD</a>
                                    <a href="${file.html_url}" class="btn view-btn" target="_blank">GITHUB</a>
                                </div>
                            </div>
                        `;
                        listContainer.appendChild(card);
                    }
                });
            } catch (err) {
                listContainer.innerHTML = "<h2>Failed to load videos. Check your GitHub settings!</h2>";
            }
        }

        fetchVideos();
    </script>
</body>
</html>

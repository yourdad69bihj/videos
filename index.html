<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS TUBE | ELITE VIDEO HUB</title>
    <style>
        :root { --purple: #BC13FE; --dark: #0F001E; --card: #1a0033; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        .nav { background: #000; padding: 15px; border-bottom: 2px solid var(--purple); display: flex; justify-content: space-between; align-items: center; padding: 10px 40px; }
        .nav h1 { color: var(--purple); margin: 0; font-size: 24px; }
        #user-display { color: var(--purple); font-weight: bold; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 30px; }
        
        .video-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #3c0064; transition: 0.3s; }
        .video-card:hover { border-color: var(--purple); box-shadow: 0 0 15px var(--purple); }
        
        video { width: 100%; aspect-ratio: 16/9; background: #000; }
        
        .info { padding: 15px; }
        .video-title { font-size: 18px; margin: 0; color: white; font-weight: bold; }
        .posted-by { color: var(--purple); font-size: 13px; margin: 5px 0 15px 0; text-transform: uppercase; }
        
        .btn { display: block; padding: 10px; text-align: center; border-radius: 6px; text-decoration: none; font-weight: bold; background: var(--purple); color: white; }

        /* Username Modal */
        #login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 15px; border: 2px solid var(--purple); text-align: center; }
        input { padding: 10px; border-radius: 5px; border: none; width: 200px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-modal">
        <div class="modal-content">
            <h2 style="color:var(--purple)">ENTER YOUR USERNAME</h2>
            <input type="text" id="username-input" placeholder="Your Name...">
            <br>
            <button class="btn" onclick="saveUsername()" style="width:100%">START WATCHING</button>
        </div>
    </div>

    <div class="nav">
        <h1>JS TUBE</h1>
        <div id="user-display">Welcome, Guest</div>
    </div>

    <div class="container" id="video-list"></div>

    <script>
        const GITHUB_USER = "YOUR_USERNAME";
        const REPO_NAME = "my-tube";
        const FOLDER_NAME = "videos"; 

        // --- USERNAME SYSTEM ---
        window.onload = function() {
            const savedUser = localStorage.getItem("jsTubeUser");
            if (!savedUser) {
                document.getElementById("login-modal").style.display = "flex";
            } else {
                document.getElementById("user-display").innerText = "Logged in as: " + savedUser;
            }
            fetchVideos();
        }

        function saveUsername() {
            const name = document.getElementById("username-input").value;
            if (name) {
                localStorage.setItem("jsTubeUser", name);
                document.getElementById("login-modal").style.display = "none";
                document.getElementById("user-display").innerText = "Logged in as: " + name;
            }
        }

        // --- VIDEO SYSTEM ---
        async function fetchVideos() {
            const listContainer = document.getElementById('video-list');
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FOLDER_NAME}`);
            const files = await response.json();

            files.forEach(file => {
                if (file.name.endsWith('.mp4')) {
                    // Splits "Name_VideoTitle.mp4" into ["Name", "VideoTitle"]
                    const parts = file.name.split('_');
                    const poster = parts.length > 1 ? parts[0] : "Unknown";
                    const title = parts.length > 1 ? parts[1].replace('.mp4', '') : file.name;

                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <video controls preload="metadata">
                            <source src="${file.download_url}" type="video/mp4">
                        </video>
                        <div class="info">
                            <p class="video-title">${title}</p>
                            <p class="posted-by">POSTED BY: ${poster}</p>
                            <a href="${file.download_url}" class="btn" download>DOWNLOAD VIDEO</a>
                        </div>
                    `;
                    listContainer.appendChild(card);
                }
            });
        }
    </script>
</body>
</html>
